spring.application.name=portfolio

spring.datasource.url=jdbc:mysql://localhost:3306/coder_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# URL base da API externa (mockada) de membros
membros.api.base-url=http://localhost:8080

# JWT
# IMPORTANTE: troque o secret por uma string aleatoria de pelo menos 32 chars em producao
jwt.secret=3f8a2c9b1d7e4f6a0c5b8d2e1f4a7c9b3d6e8f2a5c1b4d7e0f3a6c9b2d5e8f1
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
